<div class="draws-page-wrapper">

  <div class="fixed-header-wrapper">
    <mat-toolbar class="draws-toolbar">
      <button mat-raised-button type="button" (click)="back()">Back</button>
    </mat-toolbar>

    <div class="title-block">
      <h1 class="section-title">Draws</h1>
      <p class="page-subtitle">Select an event to view groups and brackets</p>
    </div>
  </div>

  <div ngClass.lt-sm="event-list-container-small" ngClass.sm="event-list-container-small" ngClass.gt-sm="event-list-container">
    <mat-nav-list class="tight-list">
      <mat-list-item *ngFor="let tournamentEvent of tournamentEvents" (click)="onSelectEvent(tournamentEvent)" class="event-list-item">
        <div matListItemTitle class="event-title">{{ tournamentEvent.name }}</div>
        <div matListItemLine class="event-schedule">{{ tournamentEvent.day | eventDay: tournamentStartDate }} {{ tournamentEvent.startTime | startTime }}</div>
        <div matListItemMeta class="event-meta">
          <mat-icon>navigate_next</mat-icon>
        </div>
      </mat-list-item>
    </mat-nav-list>
  </div>

</div>
