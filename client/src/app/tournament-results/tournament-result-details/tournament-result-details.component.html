<div class="results-page-wrapper">
  <div class="mat-headline-6 title-container">{{ eventName }} Results</div>
  <mat-toolbar>
    <button mat-raised-button type="button" [routerLink]="['/ui/results', tournamentId]">Back</button>
  </mat-toolbar>
  <ng-container *ngIf="showTabs; else oneround">
    <mat-tab-group class="results-container">
      <!--      multiple rounds - show tabs-->
      <mat-tab *ngFor="let round of selectedEvent?.roundsConfiguration?.rounds; trackBy: trackByRound"
               [label]="round.roundName">
        <div *ngIf="!round.singleElimination">
          <div class="rr-results-container" fxLayout="column"
               fxLayoutAlign="start start">
            <ng-container *ngFor="let eventResults of eventResultsList">
              <app-round-robin-results-summary [eventResults]="eventResults"></app-round-robin-results-summary>
            </ng-container>
          </div>
        </div>
        <div *ngIf="round.singleElimination">
          <div class="se-results-container">
            <app-single-elimination-bracket
              #drawPanel
              [bracketsHeight]="getBracketsHeight()"
              [roundNumbers]="roundNumbers"
              [draws]="draws"
              [roundOrdinalNumber]="round.ordinalNum"
              [playerStatusList]="[]"
              [matchCardInfos]="matchCardInfos"
              [editMode]="false"
              [allowDrawChanges]="false"
              [selectedEvent]="selectedEvent"
              [doublesEvent]="selectedEvent?.doubles">
            </app-single-elimination-bracket>
          </div>
        </div>
      </mat-tab>
    </mat-tab-group>
  </ng-container>
  <!--    one round  hide tabs -->
  <ng-template #oneround>
    <div class="one-round-panel">
      <ng-container *ngIf="hasRRRound; else seroundonly">
        <ng-container *ngFor="let eventResults of eventResultsList">
          <app-round-robin-results-summary [eventResults]="eventResults"></app-round-robin-results-summary>
        </ng-container>
      </ng-container>
      <ng-template #seroundonly>
        <app-single-elimination-bracket
          #drawPanel
          [editMode]="false"
          [allowDrawChanges]="false"
          [bracketsHeight]="getBracketsHeight()"
          [draws]="draws"
          [playerStatusList]="[]"
          [matchCardInfos]="matchCardInfos"
          [selectedEvent]="selectedEvent"
          [doublesEvent]="selectedEvent?.doubles">
        </app-single-elimination-bracket>
      </ng-template>
    </div>
  </ng-template>
</div>
